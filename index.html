<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    #box {
      position: absolute;
      background: white;
      padding: 20px;
      text-align: center;
      z-index: 10;
      border-radius: 10px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
  </style>
</head>

<body>

<!-- Cookie popup -->
<div id="box">
  <p>We would like to show you cookies 🍪</p>
  <button id="accept">Accept</button>
  <button id="decline">Decline</button>
</div>

<!-- Video -->
<video id="video" loop>
  <source src="media/2026-05-28 22-52-54.mp4" type="video/mp4">
</video>

<script>
const btn = document.getElementById("accept");
const box = document.getElementById("box");
const video = document.getElementById("video");

btn.addEventListener("click", async () => {
  box.style.display = "none";
  video.style.display = "block";

  try {
    await video.play(); // THIS is what unlocks autoplay with sound
  } catch (e) {
    console.log("Play blocked:", e);
  }
});
</script>

</body>
</html>
