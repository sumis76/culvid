<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Video</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial;
      color: white;
    }

    /* FULLSCREEN FAKE BLOG BACKGROUND */
    #bg {
      position: fixed;
      inset: 0;
      background: url("media/Screenshot%202026-05-31%20175928.png") center/cover no-repeat;
      filter: blur(12px);
      transform: scale(1.05);
    }

    /* DARK OVERLAY FOR READABILITY */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    /* COOKIE BANNER */
    #box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      z-index: 10;
      overflow: hidden;
      color: white;
    }

    #box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("media/Screenshot%202026-05-31%20175928.png") center/cover no-repeat;
      filter: blur(10px);
      transform: scale(1.2);
      z-index: 0;
    }

    #box::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    #box-content {
      position: relative;
      z-index: 2;
    }

    #small {
      font-size: 12px;
      opacity: 0.85;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    /* RICKROLL */
    #rickroll {
      display: none;
      position: relative;
      z-index: 5;
      text-align: center;
      padding-top: 40px;
    }

    video {
      width: 80vw;
      max-height: 70vh;
    }

    h1 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg"></div>
<div id="overlay"></div>

<!-- COOKIE POPUP -->
<div id="box">
  <div id="box-content">
    <p><b>Yum! Cookiesssssss!!!!!</b></p>
    <p id="small">We need you to consent to our cookies.</p>

    <button id="accept">Accept</button>
    <button id="decline">Decline</button>
  </div>
</div>

<!-- RICKROLL -->
<div id="rickroll">
  <h1>You have been rickrolled! hahaha</h1>

  <video id="video" loop>
    <source src="media/2026-05-28 22-52-54.mp4" type="video/mp4">
  </video>
</div>

<script>
const btn = document.getElementById("accept");
const box = document.getElementById("box");
const rick = document.getElementById("rickroll");
const video = document.getElementById("video");

btn.addEventListener("click", async () => {
  box.style.display = "none";
  rick.style.display = "block";

  try {
    await video.play();
  } catch (e) {
    console.log("Play blocked:", e);
  }
});
</script>

</body>
</html>
